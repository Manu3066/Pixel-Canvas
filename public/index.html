<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Canvas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0f0f11; --surface:#1a1a1f; --border:#2a2a35; --text:#e8e8f0; --muted:#6b6b80; --accent:#7c6fff; }
    body { background:var(--bg); color:var(--text); font-family:'Courier New',monospace; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px 16px; gap:20px; }
    header { display:flex; align-items:center; gap:10px; width:100%; max-width:820px; flex-wrap:wrap; }
    .logo { width:28px; height:28px; display:grid; grid-template-columns:1fr 1fr; gap:2px; flex-shrink:0; }
    .logo span { border-radius:1px; }
    .logo span:nth-child(1){background:#7c6fff} .logo span:nth-child(2){background:#ff6f9c}
    .logo span:nth-child(3){background:#6fcfff} .logo span:nth-child(4){background:#6fff9e}
    h1 { font-size:14px; letter-spacing:0.12em; text-transform:uppercase; font-weight:normal; }
    .badge { margin-left:auto; font-size:11px; color:var(--muted); border:1px solid var(--border); padding:3px 10px; border-radius:20px; }
    #connDot { width:8px; height:8px; border-radius:50%; background:#ff4136; display:inline-block; transition:background 0.3s; }
    #connText, #userCount { font-size:10px; color:var(--muted); }
    .room-bar { display:flex; align-items:center; gap:8px; width:100%; max-width:820px; }
    .room-bar label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; }
    #roomInput { background:var(--surface); border:1px solid var(--border); color:var(--text); font-family:inherit; font-size:12px; padding:6px 10px; border-radius:5px; width:160px; }
    #joinRoomBtn { background:var(--accent); border:none; color:white; font-family:inherit; font-size:11px; padding:6px 14px; border-radius:5px; cursor:pointer; letter-spacing:0.06em; }
    #joinRoomBtn:hover { opacity:0.85; }
    #currentRoom { font-size:11px; color:var(--muted); }
    .workspace { display:flex; gap:16px; align-items:flex-start; }
    .sidebar { display:flex; flex-direction:column; gap:16px; min-width:140px; }
    .panel { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px; }
    .panel-label { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
    .palette { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; }
    .swatch { width:100%; aspect-ratio:1; border-radius:4px; cursor:pointer; border:2px solid transparent; transition:transform 0.1s; }
    .swatch:hover { transform:scale(1.12); }
    .swatch.active { border-color:white; }
    .custom-row { display:flex; align-items:center; gap:8px; margin-top:10px; }
    .custom-row label { font-size:10px; color:var(--muted); text-transform:uppercase; }
    #customColor { width:32px; height:28px; border:1px solid var(--border); border-radius:4px; padding:2px; background:var(--surface); cursor:pointer; }
    .tool-btn { width:100%; background:transparent; border:1px solid var(--border); color:var(--muted); font-family:inherit; font-size:11px; letter-spacing:0.06em; text-transform:uppercase; padding:8px 10px; border-radius:5px; cursor:pointer; text-align:left; display:flex; align-items:center; gap:8px; margin-bottom:6px; transition:background 0.15s,color 0.15s; }
    .tool-btn:hover { background:var(--border); color:var(--text); }
    .tool-btn.active { background:var(--accent); border-color:var(--accent); color:white; }
    .stat-row { display:flex; justify-content:space-between; font-size:11px; margin-bottom:5px; }
    .stat-row span:first-child { color:var(--muted); }
    #rateMsg { font-size:10px; color:#ff4136; min-height:14px; margin-top:6px; text-align:center; }
    canvas { display:block; image-rendering:pixelated; cursor:crosshair; border:1px solid var(--border); border-radius:4px; width:640px; height:640px; }
  </style>
</head>
<body>

<header>
  <div class="logo"><span></span><span></span><span></span><span></span></div>
  <h1>Pixel Canvas</h1>
  <span class="badge">Steps 4·5·6</span>
  <span id="connDot"></span>
  <span id="connText">connecting…</span>
  <span id="userCount">👥 0 online</span>
</header>

<!-- Step 6: Room switcher -->
<div class="room-bar">
  <label>Room:</label>
  <input id="roomInput" type="text" placeholder="room name…" value="default" maxlength="20" />
  <button id="joinRoomBtn">Join</button>
  <span id="currentRoom">📍 default</span>
</div>

<div class="workspace">
  <div class="sidebar">
    <div class="panel">
      <div class="panel-label">Color</div>
      <div class="palette" id="palette"></div>
      <div class="custom-row">
        <label>Custom</label>
        <input type="color" id="customColor" value="#7c6fff" />
      </div>
    </div>
    <div class="panel">
      <div class="panel-label">Tool</div>
      <button class="tool-btn active" id="toolDraw">✏️ Draw</button>
      <button class="tool-btn" id="toolErase">⬜ Erase</button>
      <button class="tool-btn" id="toolFill">🪣 Fill</button>
    </div>
    <div class="panel">
      <div class="panel-label">Canvas</div>
      <div class="stat-row"><span>Size</span><span>64 × 64</span></div>
      <div class="stat-row"><span>Pixels</span><span id="statPixels">0</span></div>
      <div class="stat-row"><span>Tool</span><span id="statTool">draw</span></div>
      <div class="stat-row"><span>Room</span><span id="statRoom">default</span></div>
      <br/>
      <button class="tool-btn" id="clearBtn">🗑️ Clear</button>
      <div id="rateMsg"></div>
    </div>
  </div>

  <canvas id="canvas" width="640" height="640"></canvas>
</div>

<script>
  const COLS=64,ROWS=64,CELL=10,GRID_COLOR='#1e1e26';
  const PALETTE_COLORS=['#000000','#ffffff','#ff4136','#ff851b','#ffdc00','#2ecc40','#00b4d8','#0074d9','#7c6fff','#ff6f9c','#a259ff','#ff9f1c','#6fff9e','#6fcfff','#c9b99a','#7a7a8c'];

  // pixels[y][x] = { color, timestamp } or null
  const pixels = Array.from({length:ROWS}, () => new Array(COLS).fill(null));
  let activeColor='#7c6fff', activeTool='draw', isMouseDown=false, paintedCount=0;
  let currentRoom = 'default';

  // Step 6: client-side rate limiting (mirrors server)
  let lastPaintTime = 0;
  const RATE_LIMIT_MS = 200;

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  function drawGrid() {
    ctx.strokeStyle=GRID_COLOR; ctx.lineWidth=0.5;
    for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,ROWS*CELL);ctx.stroke();}
    for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(COLS*CELL,y*CELL);ctx.stroke();}
  }

  function fullRedraw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let y=0;y<ROWS;y++)
      for(let x=0;x<COLS;x++)
        if(pixels[y][x]) { ctx.fillStyle=pixels[y][x].color; ctx.fillRect(x*CELL+1,y*CELL+1,CELL-1,CELL-1); }
    drawGrid();
  }

  function setPixel(x, y, color, timestamp) {
    if(x<0||x>=COLS||y<0||y>=ROWS) return false;
    const ts = timestamp || Date.now();
    const existing = pixels[y][x];
    // Step 5: conflict resolution — reject if existing is newer
    if(existing && existing.timestamp > ts) return false;
    const wasEmpty = !existing;
    pixels[y][x] = color ? { color, timestamp: ts } : null;
    if(color && wasEmpty) paintedCount++;
    if(!color && !wasEmpty) paintedCount = Math.max(0, paintedCount-1);
    if(color) { ctx.fillStyle=color; ctx.fillRect(x*CELL+1,y*CELL+1,CELL-1,CELL-1); }
    else { ctx.clearRect(x*CELL+1,y*CELL+1,CELL-1,CELL-1); }
    ctx.strokeStyle=GRID_COLOR; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo((x+1)*CELL,y*CELL); ctx.lineTo((x+1)*CELL,(y+1)*CELL); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x*CELL,(y+1)*CELL); ctx.lineTo((x+1)*CELL,(y+1)*CELL); ctx.stroke();
    document.getElementById('statPixels').textContent = paintedCount;
    return true;
  }

  // Load full canvas from server (Step 4)
  function loadCanvas(serverCanvas) {
    paintedCount = 0;
    for(let y=0;y<ROWS;y++)
      for(let x=0;x<COLS;x++) {
        pixels[y][x] = serverCanvas[y][x];
        if(pixels[y][x]) paintedCount++;
      }
    fullRedraw();
    document.getElementById('statPixels').textContent = paintedCount;
  }

  function floodFill(sx, sy, newColor) {
    const target = pixels[sy][sx] ? pixels[sy][sx].color : null;
    if(target === newColor) return;
    const queue=[[sx,sy]], visited=new Set();
    while(queue.length) {
      const[cx,cy]=queue.shift(); const key=cx+','+cy;
      if(visited.has(key)) continue;
      if(cx<0||cx>=COLS||cy<0||cy>=ROWS) continue;
      const cellColor = pixels[cy][cx] ? pixels[cy][cx].color : null;
      if(cellColor !== target) continue;
      visited.add(key);
      const ts = Date.now();
      pixels[cy][cx] = newColor ? {color:newColor, timestamp:ts} : null;
      queue.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
    }
    fullRedraw();
  }

  // Step 6: rate limit feedback
  let rateMsgTimer;
  function showRateMsg() {
    const el = document.getElementById('rateMsg');
    el.textContent = '⏱ slow down!';
    clearTimeout(rateMsgTimer);
    rateMsgTimer = setTimeout(() => el.textContent='', 800);
  }

  function applyTool(x, y) {
    // Step 6: client-side rate limit
    const now = Date.now();
    if(activeTool !== 'fill' && now - lastPaintTime < RATE_LIMIT_MS) { showRateMsg(); return; }
    lastPaintTime = now;

    if(activeTool==='draw') {
      const ts = Date.now();
      const changed = setPixel(x, y, activeColor, ts);
      if(changed) sendPixel(x, y, activeColor, ts);
    }
    if(activeTool==='erase') {
      const ts = Date.now();
      const changed = setPixel(x, y, null, ts);
      if(changed) sendPixel(x, y, null, ts);
    }
    if(activeTool==='fill') {
      const before = pixels.map(r=>r.map(c=>c?{...c}:null));
      floodFill(x, y, activeColor);
      const ts = Date.now();
      for(let fy=0;fy<ROWS;fy++)
        for(let fx=0;fx<COLS;fx++) {
          const bColor = before[fy][fx] ? before[fy][fx].color : null;
          const aColor = pixels[fy][fx] ? pixels[fy][fx].color : null;
          if(aColor !== bColor) sendPixel(fx, fy, aColor, ts);
        }
    }
  }

  function getCellFromEvent(e) {
    const rect=canvas.getBoundingClientRect();
    return { x:Math.floor((e.clientX-rect.left)*(canvas.width/rect.width)/CELL), y:Math.floor((e.clientY-rect.top)*(canvas.height/rect.height)/CELL) };
  }

  canvas.addEventListener('mousedown', e=>{isMouseDown=true; const c=getCellFromEvent(e); applyTool(c.x,c.y);});
  canvas.addEventListener('mousemove', e=>{if(!isMouseDown||activeTool==='fill')return; const c=getCellFromEvent(e); applyTool(c.x,c.y);});
  canvas.addEventListener('mouseup', ()=>isMouseDown=false);
  canvas.addEventListener('mouseleave', ()=>isMouseDown=false);

  function selectColor(hex) {
    activeColor=hex;
    document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('active',s.dataset.color===hex));
    document.getElementById('customColor').value=hex;
    if(activeTool==='erase') setTool('draw');
  }

  function buildPalette() {
    const container=document.getElementById('palette');
    PALETTE_COLORS.forEach(hex=>{
      const s=document.createElement('div');
      s.className='swatch'+(hex===activeColor?' active':'');
      s.style.background=hex; s.dataset.color=hex;
      s.addEventListener('click',()=>selectColor(hex));
      container.appendChild(s);
    });
  }

  document.getElementById('customColor').addEventListener('input', e=>selectColor(e.target.value));

  function setTool(name) {
    activeTool=name;
    ['Draw','Erase','Fill'].forEach(t=>document.getElementById('tool'+t).classList.toggle('active',t.toLowerCase()===name));
    document.getElementById('statTool').textContent=name;
    canvas.style.cursor=name==='fill'?'cell':'crosshair';
  }

  document.getElementById('toolDraw').addEventListener('click',()=>setTool('draw'));
  document.getElementById('toolErase').addEventListener('click',()=>setTool('erase'));
  document.getElementById('toolFill').addEventListener('click',()=>setTool('fill'));
  document.getElementById('clearBtn').addEventListener('click',()=>{
    for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++) pixels[y][x]=null;
    paintedCount=0; fullRedraw(); document.getElementById('statPixels').textContent=0;
  });

  // Step 6: Room switching
  document.getElementById('joinRoomBtn').addEventListener('click', () => {
    const roomId = document.getElementById('roomInput').value.trim() || 'default';
    joinRoom(roomId);
  });
  document.getElementById('roomInput').addEventListener('keydown', e => {
    if(e.key==='Enter') document.getElementById('joinRoomBtn').click();
  });

  function joinRoom(roomId) {
    currentRoom = roomId;
    document.getElementById('currentRoom').textContent = '📍 ' + roomId;
    document.getElementById('statRoom').textContent = roomId;
    if(ws && ws.readyState===WebSocket.OPEN) {
      ws.send(JSON.stringify({ type:'join_room', roomId }));
    }
  }

  // ── WebSocket ─────────────────────────────────────────────────────────────
  let ws, connected=false;

  function connectWebSocket() {
    const protocol = location.protocol==='https:'?'wss':'ws';
    ws = new WebSocket(protocol+'://'+location.host);

    ws.onopen = function() {
      connected=true;
      document.getElementById('connDot').style.background='#2ecc40';
      document.getElementById('connText').textContent='connected';
      console.log('WebSocket connected!');
    };

    ws.onclose = function() {
      connected=false;
      document.getElementById('connDot').style.background='#ff4136';
      document.getElementById('connText').textContent='reconnecting…';
      setTimeout(connectWebSocket, 2000);
    };

    ws.onerror = function(e) { console.error('WS error',e); };

    ws.onmessage = function(event) {
      const msg = JSON.parse(event.data);

      // Step 4: Load full canvas on join/room switch
      if(msg.type==='init') {
        loadCanvas(msg.canvas);
        document.getElementById('userCount').textContent='👥 '+msg.clientCount+' online';
        document.getElementById('currentRoom').textContent='📍 '+msg.roomId;
        document.getElementById('statRoom').textContent=msg.roomId;
      }

      if(msg.type==='user_joined'||msg.type==='user_left') {
        document.getElementById('userCount').textContent='👥 '+msg.clientCount+' online';
      }

      // Step 5: Remote pixel with conflict resolution
      if(msg.type==='pixel') {
        setPixel(msg.x, msg.y, msg.color, msg.timestamp);
      }

      // Step 5: Server rejected our pixel — revert it
      if(msg.type==='pixel_reject') {
        setPixel(msg.x, msg.y, msg.color, Date.now()+9999);
        console.log('Pixel conflict at',msg.x,msg.y,'— reverted');
      }
    };
  }

  function sendPixel(x, y, color, timestamp) {
    if(!connected||ws.readyState!==WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type:'pixel', x, y, color, timestamp }));
  }

  buildPalette();
  fullRedraw();
  connectWebSocket();
</script>
</body>
</html>
